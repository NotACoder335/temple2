<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Pulikkathara Sree Vishnu Maya-Bhadrakali Temple</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manjari:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind Output -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-temple-bg text-temple-text font-sans antialiased min-h-screen flex flex-col">
    <div id="navbar-container"></div>
    
    <main class="flex-grow py-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto w-full">
        <h1 class="text-4xl md:text-5xl font-bold text-temple-maroon mb-12 text-center" data-i18n="gallery_title">Photo Gallery</h1>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid">
            <!-- Images with explicit aspect ratios -->
            <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
                <img src="https://placehold.co/400x400/800000/D4AF37?text=Temple+1" alt="Gallery Image 1" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110 gallery-img">
            </div>
            <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
                <img src="https://placehold.co/400x400/D4AF37/800000?text=Temple+2" alt="Gallery Image 2" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110 gallery-img">
            </div>
            <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
                <img src="https://placehold.co/400x400/333333/FCFBF7?text=Temple+3" alt="Gallery Image 3" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110 gallery-img">
            </div>
            <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
                <img src="https://placehold.co/400x400/800000/FCFBF7?text=Temple+4" alt="Gallery Image 4" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110 gallery-img">
            </div>
            <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
                <img src="https://placehold.co/400x400/D4AF37/333333?text=Temple+5" alt="Gallery Image 5" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110 gallery-img">
            </div>
             <div class="aspect-square bg-gray-200 overflow-hidden cursor-pointer group">
                <img src="https://placehold.co/400x400/333333/D4AF37?text=Temple+6" alt="Gallery Image 6" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110 gallery-img">
            </div>
        </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 bg-black/90 z-[60] hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <button id="lightbox-close" class="absolute top-6 right-6 text-white hover:text-temple-gold z-[70]">
            <svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="lightbox-img" src="" alt="Enlarged" class="max-w-full max-h-[90vh] object-contain transform scale-95 transition-transform duration-300">
    </div>

    <div id="footer-container"></div>
    
    <script src="./assets/js/i18n.js"></script>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/js/gallery.js"></script>
</body>
</html>
